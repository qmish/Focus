apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messenger-prod-ingress
  namespace: messenger-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chat.focus.ftsystems.ru
        - admin.focus.ftsystems.ru
        - api.focus.ftsystems.ru
      secretName: focus-ftsystems-tls
  rules:
    - host: api.focus.ftsystems.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-go
                port:
                  number: 80
    - host: chat.focus.ftsystems.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: admin.focus.ftsystems.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-admin
                port:
                  number: 80
