---
# Root self-signed issuer (used only to bootstrap the CA)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# CA Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: focus-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: Focus Internal CA
  duration: 87600h # 10 years
  secretName: focus-ca-secret
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# ClusterIssuer backed by the CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: focus-ca-issuer
spec:
  ca:
    secretName: focus-ca-secret
