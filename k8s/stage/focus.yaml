apiVersion: v1
kind: Namespace
metadata:
  name: messenger-stage
  labels:
    name: messenger-stage
    environment: stage
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# NOTE: focus-secrets Secret is managed separately (kubectl create secret).
# Do NOT include it here to avoid overwriting real credentials with placeholders.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-conf
  namespace: messenger-stage
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        resolver 10.43.0.10 valid=10s;
        set $api_upstream "http://api-go.messenger-stage.svc.cluster.local";

        location /api/ {
            # CORS for Tauri desktop clients
            set $cors_origin "";
            if ($http_origin ~* "^https?://tauri\.localhost$") {
                set $cors_origin $http_origin;
            }
            if ($http_origin ~* "^https?://localhost(:[0-9]+)?$") {
                set $cors_origin $http_origin;
            }
            if ($http_origin ~* "^https?://127\.0\.0\.1(:[0-9]+)?$") {
                set $cors_origin $http_origin;
            }
            if ($cors_origin != "") {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age 300 always;
            }
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age 300 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-go
  namespace: messenger-stage
  labels:
    app: api-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-go
  template:
    metadata:
      labels:
        app: api-go
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: regcred
      containers:
      - name: api-go
        image: registry.focus.local/focus/api-go:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: swagger
        env:
        - name: ENV
          value: stage
        - name: AUTO_MIGRATE
          value: "true"
        - name: SERVER_PORT
          value: "8080"
        - name: SWAGGER_PORT
          value: "8081"
        - name: DB_HOST
          value: postgres.infra.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: focus
        - name: DB_USER
          value: focus
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: db-password
        - name: REDIS_HOST
          value: redis.infra.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: redis-password
        - name: KEYCLOAK_URL
          value: https://auth.focus.local:30443
        - name: KEYCLOAK_CLIENT_ID
          value: messenger-api
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: keycloak-client-secret
        - name: JITSI_BASE_URL
          value: https://meet-stage.company.com
        - name: JITSI_APP_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: jitsi-app-secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: session-secret
        - name: EXCHANGE_PROVIDER
          value: ews
        - name: EXCHANGE_EWS_URL
          value: https://exchange-stage.company.local/EWS/Exchange.asmx
        - name: EXCHANGE_DOMAIN
          value: COMPANY
        - name: EXCHANGE_AUTH_MODE
          value: basic
        - name: EXCHANGE_CA_CERT_PATH
          value: ""
        - name: EXCHANGE_INSECURE_TLS
          value: "false"
        - name: EXCHANGE_KRB5_CONFIG_PATH
          value: ""
        - name: EXCHANGE_KRB5_KEYTAB_PATH
          value: ""
        - name: EXCHANGE_KRB5_REALM
          value: ""
        - name: EXCHANGE_KRB5_SERVICE_PRINCIPAL
          value: ""
        - name: EXCHANGE_IMPERSONATION
          value: "true"
        - name: EXCHANGE_SYNC_ENABLED
          value: "true"
        - name: EXCHANGE_SYNC_INTERVAL
          value: 2m
        - name: EXCHANGE_SYNC_LOOKBACK
          value: 12h
        - name: EXCHANGE_SYNC_LOOKAHEAD
          value: 336h
        - name: EXCHANGE_USERNAME
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: exchange-username
        - name: EXCHANGE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: exchange-password
        - name: WS_ALLOWED_ORIGINS
          value: "https://chat.focus.local:30443,https://focus.local:30443,https://focus.ftsystems.ru,http://tauri.localhost,https://tauri.localhost,http://localhost:3000,http://localhost:5173"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      dnsPolicy: ClusterFirst
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: messenger-stage
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-conf
        configMap:
          name: frontend-nginx-conf
      imagePullSecrets:
      - name: regcred
      containers:
      - name: frontend
        image: registry.focus.local/focus/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-admin
  namespace: messenger-stage
  labels:
    app: frontend-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-admin
  template:
    metadata:
      labels:
        app: frontend-admin
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-conf
        configMap:
          name: frontend-nginx-conf
      - name: sso-html
        configMap:
          name: frontend-admin-sso
      imagePullSecrets:
      - name: regcred
      containers:
      - name: frontend-admin
        image: registry.focus.local/focus/frontend-admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: sso-html
          mountPath: /usr/share/nginx/html/silent-check-sso.html
          subPath: silent-check-sso.html
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: api-go
  namespace: messenger-stage
spec:
  selector:
    app: api-go
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: swagger
    port: 8081
    targetPort: swagger
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: messenger-stage
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-admin
  namespace: messenger-stage
spec:
  selector:
    app: frontend-admin
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-go-hpa
  namespace: messenger-stage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-go
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messenger-stage-ingress
  namespace: messenger-stage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: api-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-go
            port:
              number: 80
  - host: chat-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: chat.focus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: admin.focus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-admin
            port:
              number: 80
  - host: api.focus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-go
            port:
              number: 80
  - host: admin-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-admin
            port:
              number: 80
  - host: swagger-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-go
            port:
              number: 8081
  - host: swagger.focus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-go
            port:
              number: 8081
  tls:
  - hosts:
    - api-stage.company.com
    secretName: api-stage-tls
  - hosts:
    - chat-stage.company.com
    secretName: chat-stage-tls
  - hosts:
    - chat.focus.local
    secretName: focus-local-tls
  - hosts:
    - admin.focus.local
    - api.focus.local
    secretName: focus-local-tls
  - hosts:
    - admin-stage.company.com
    secretName: admin-stage-tls
  - hosts:
    - swagger-stage.company.com
    secretName: swagger-stage-tls
  - hosts:
    - swagger.focus.local
    secretName: focus-local-tls
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-nginx
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-infra-and-dns
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: infra
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: keycloak
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-go-pdb
  namespace: messenger-stage
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-go
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: messenger-stage
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-admin-pdb
  namespace: messenger-stage
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend-admin
