apiVersion: v1
kind: Namespace
metadata:
  name: messenger-stage
  labels:
    name: messenger-stage
    environment: stage
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Secret
metadata:
  name: focus-secrets
  namespace: messenger-stage
  annotations:
    focus.dev/rotation-window: "30d"
type: Opaque
stringData:
  db-password: CHANGE_ME_STAGE_DB_PASSWORD
  redis-password: CHANGE_ME_STAGE_REDIS_PASSWORD
  keycloak-client-secret: CHANGE_ME_STAGE_KEYCLOAK_CLIENT_SECRET
  session-secret: CHANGE_ME_STAGE_SESSION_SECRET
  jitsi-app-secret: CHANGE_ME_STAGE_JITSI_SECRET
  exchange-client-secret: CHANGE_ME_STAGE_EXCHANGE_CLIENT_SECRET
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-go
  namespace: messenger-stage
  labels:
    app: api-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-go
  template:
    metadata:
      labels:
        app: api-go
    spec:
      containers:
      - name: api-go
        image: ghcr.io/qmish/focus/api-go:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ENV
          value: stage
        - name: SERVER_PORT
          value: "8080"
        - name: DB_HOST
          value: postgres.infra.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: focus
        - name: DB_USER
          value: focus
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: db-password
        - name: REDIS_HOST
          value: redis.infra.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: redis-password
        - name: KEYCLOAK_URL
          value: https://keycloak-stage.company.com
        - name: KEYCLOAK_CLIENT_ID
          value: messenger-api
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: keycloak-client-secret
        - name: JITSI_BASE_URL
          value: https://meet-stage.company.com
        - name: JITSI_APP_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: jitsi-app-secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: focus-secrets
              key: session-secret
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      dnsPolicy: ClusterFirst
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: messenger-stage
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/qmish/focus/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-admin
  namespace: messenger-stage
  labels:
    app: frontend-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-admin
  template:
    metadata:
      labels:
        app: frontend-admin
    spec:
      containers:
      - name: frontend-admin
        image: ghcr.io/qmish/focus/frontend-admin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-go
  namespace: messenger-stage
spec:
  selector:
    app: api-go
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: messenger-stage
spec:
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-admin
  namespace: messenger-stage
spec:
  selector:
    app: frontend-admin
  ports:
  - name: http
    port: 80
    targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-go-hpa
  namespace: messenger-stage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-go
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messenger-stage-ingress
  namespace: messenger-stage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: api-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-go
            port:
              number: 80
  - host: chat-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: admin-stage.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-admin
            port:
              number: 80
  tls:
  - hosts:
    - api-stage.company.com
    secretName: api-stage-tls
  - hosts:
    - chat-stage.company.com
    secretName: chat-stage-tls
  - hosts:
    - admin-stage.company.com
    secretName: admin-stage-tls
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-nginx
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-infra-and-dns
  namespace: messenger-stage
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: infra
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
