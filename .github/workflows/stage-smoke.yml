name: Stage Smoke

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Stage API URL"
        required: true
        default: "https://api-stage.company.com"
      chat_url:
        description: "Stage Chat URL"
        required: true
        default: "https://chat-stage.company.com"
      admin_url:
        description: "Stage Admin URL"
        required: true
        default: "https://admin-stage.company.com"

jobs:
  stage-smoke:
    name: Run stage smoke checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute smoke script
        run: |
          chmod +x tests/smoke/stage-smoke.sh
          tests/smoke/stage-smoke.sh \
            "${{ github.event.inputs.api_url }}" \
            "${{ github.event.inputs.chat_url }}" \
            "${{ github.event.inputs.admin_url }}"
