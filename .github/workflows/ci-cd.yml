name: Focus Quality Gates

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - "jitsi-meet-master/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "jitsi-meet-master/**"
  workflow_dispatch:

env:
  GO_VERSION: "1.21"
  NODE_VERSION: "20"

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: focus
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: API_Go/go.sum
      - name: Run go tests
        working-directory: API_Go
        run: go test -v -race ./...

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: API_Go
          args: --timeout=5m

  k8s-manifests-validate:
    name: K8s manifests validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
      - name: Validate stage/prod manifests
        run: |
          kubeconform -summary -strict -ignore-missing-schemas \
            k8s/stage/focus.yaml \
            k8s/prod/focus.yaml \
            k8s/hpa-api.yaml \
            k8s/hpa-frontend.yaml \
            k8s/hpa-jvb.yaml \
            k8s/servicemonitor-api.yaml \
            k8s/prometheus-rules.yaml

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

  frontend-admin-tests:
    name: Frontend-admin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json
      - name: Install frontend-admin deps
        working-directory: frontend-admin
        run: npm ci
      - name: Run frontend-admin tests
        working-directory: frontend-admin
        run: npm test -- --run

  e2e-api-smoke:
    name: E2E API smoke
    runs-on: ubuntu-latest
    needs: [backend-tests, k8s-manifests-validate]
    services:
      postgres:
        image: postgres:15.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: focus
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Start API in background
        working-directory: API_Go
        run: |
          ENV=development DB_HOST=localhost DB_PORT=5432 DB_USER=postgres DB_PASSWORD=postgres DB_NAME=focus REDIS_HOST=localhost REDIS_PORT=6379 SERVER_PORT=8080 SESSION_SECRET=ci-session-secret JITSI_APP_SECRET=ci-jitsi-secret go run cmd/server/main.go > /tmp/focus-api.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/focus-api.log
          exit 1
      - name: Install E2E deps
        working-directory: tests/e2e
        run: npm install
      - name: Run API-only E2E smoke
        working-directory: tests/e2e
        run: npx playwright test --grep "API Smoke|API Flows"

  load-smoke:
    name: Load smoke gate
    runs-on: ubuntu-latest
    needs: [e2e-api-smoke]
    services:
      postgres:
        image: postgres:15.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: focus
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start API in background
        working-directory: API_Go
        run: |
          ENV=development DB_HOST=localhost DB_PORT=5432 DB_USER=postgres DB_PASSWORD=postgres DB_NAME=focus REDIS_HOST=localhost REDIS_PORT=6379 SERVER_PORT=8080 SESSION_SECRET=ci-session-secret JITSI_APP_SECRET=ci-jitsi-secret go run cmd/server/main.go > /tmp/focus-api-load.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/focus-api-load.log
          exit 1
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke
        run: k6 run tests/load/ci-smoke.js

  security-gates:
    name: Security gates
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, frontend-admin-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run govulncheck
        working-directory: API_Go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Frontend npm audit (prod deps)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: Frontend-admin npm audit (prod deps)
        working-directory: frontend-admin
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Build API image for scan
        run: docker build -t focus-api:ci-scan ./API_Go
      - name: Trivy container scan (API image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: focus-api:ci-scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

