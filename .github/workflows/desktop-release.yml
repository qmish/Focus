name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Create desktop .env
        working-directory: desktop
        run: |
          cat > .env << 'ENVEOF'
          VITE_API_URL=https://chat.focus.local:30443
          VITE_KEYCLOAK_URL=https://auth.focus.local:30443
          VITE_KEYCLOAK_REALM=company
          VITE_KEYCLOAK_CLIENT_ID=messenger-frontend
          VITE_JITSI_DOMAIN=meet.focus.local:30443
          ENVEOF

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Focus Messenger Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Focus Messenger — Десктопный клиент ${{ github.ref_name }}

            Десктопное приложение Focus Messenger на базе Tauri 2.

            ### Возможности
            - Полная функциональность веб-версии в нативном окне
            - Авторизация: локальная и через Keycloak (PKCE)
            - Чат в реальном времени (WebSocket)
            - Видеозвонки через Jitsi Meet
            - Нативные уведомления (Windows/macOS)
            - Системный трей (сворачивание при закрытии)
            - Автозапуск при старте системы
            - Единственный экземпляр приложения

            ### Установка
            - **Windows x64**: скачайте `.exe` установщик (NSIS)
            - **macOS Apple Silicon (M1/M2/M3)**: скачайте `_aarch64.dmg`
            - **macOS Intel**: скачайте `_x64.dmg`

            ### Требования
            - Windows 10 (1809+) / Windows 11 или macOS 10.15+
            - Корпоративный CA-сертификат в системном хранилище
          releaseDraft: false
          prerelease: false
