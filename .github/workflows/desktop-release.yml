name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Focus Desktop ${{ github.ref_name }}'
          releaseBody: |
            Десктопный клиент Focus Messenger.

            ## Установка
            - **Windows**: скачайте `.exe` установщик (NSIS)
            - **macOS Intel**: скачайте `.dmg` (x86_64)
            - **macOS Apple Silicon**: скачайте `.dmg` (aarch64)
          releaseDraft: true
          prerelease: false
