version: '3.8'

services:
  # PostgreSQL - основная база данных
  postgres:
    image: postgres:15.4-alpine
    container_name: focus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-focus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - focus-network

  # Redis - кэш и сессии
  redis:
    image: redis:7.2-alpine
    container_name: focus-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - focus-network

  # Keycloak - SSO сервер
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: focus-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://postgres:5432/keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command: start-dev
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - focus-network

  # API сервер (в разработке)
  api:
    build:
      context: ./API_Go
      dockerfile: Dockerfile
    container_name: focus-api
    environment:
      ENV: development
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-focus}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-company}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-messenger-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-secret}
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.company.com}
      JITSI_APP_ID: ${JITSI_APP_ID:-jitsi}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET:-secret}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - focus-network
    volumes:
      - ./API_Go:/app
    command: go run cmd/server/main.go

  # Frontend (messenger)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: focus-frontend
    environment:
      VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:8080}
      VITE_KEYCLOAK_URL: ${FRONTEND_VITE_KEYCLOAK_URL:-http://localhost:8180}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-company}
      VITE_KEYCLOAK_CLIENT_ID: ${FRONTEND_VITE_KEYCLOAK_CLIENT_ID:-messenger-frontend}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - focus-network
    command: npm run dev -- --host 0.0.0.0 --port 5173

  # Frontend (admin panel)
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile.dev
    container_name: focus-frontend-admin
    environment:
      VITE_API_URL: ${ADMIN_VITE_API_URL:-http://localhost:8080}
      VITE_KEYCLOAK_URL: ${ADMIN_VITE_KEYCLOAK_URL:-http://localhost:8180}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-company}
      VITE_KEYCLOAK_CLIENT_ID: ${ADMIN_VITE_KEYCLOAK_CLIENT_ID:-messenger-admin}
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./frontend-admin:/app
      - frontend_admin_node_modules:/app/node_modules
    networks:
      - focus-network
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  keycloak_data:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_admin_node_modules:
    driver: local

networks:
  focus-network:
    driver: bridge
